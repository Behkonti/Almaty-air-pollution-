<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Качество воздуха — Алматы</title>

<link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.aqi {
  font-size: 40px;
  text-align: center;
  margin-top: 10px;
}

.status {
  text-align: center;
  font-size: 18px;
}

#map {
  height: 400px;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌫 Качество воздуха в Алматы</h1>

<div class="card">
  <div class="aqi" id="aqi">Загрузка...</div>
  <div class="status" id="status"></div>
</div>

<div class="card">
  <div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([43.25, 76.95], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let marker = L.marker([43.25, 76.95]).addTo(map);

// 🔥 Функция получения данных
async function loadAirData() {
  try {
    const res = await fetch("https://api.openaq.org/v2/latest?city=Almaty");
    const data = await res.json();

    let pm25 = data.results[0].measurements.find(m => m.parameter === "pm25");

    let value = pm25 ? pm25.value : "Нет данных";

    document.getElementById("aqi").innerText = value;

    let status = "Хорошо";
    if (value > 50) status = "Средне";
    if (value > 100) status = "Плохо";
    if (value > 150) status = "Опасно";

    document.getElementById("status").innerText = status;

    marker.bindPopup(`PM2.5: ${value}`).openPopup();

  } catch (e) {
    document.getElementById("aqi").innerText = "Ошибка загрузки";
  }
}

// первая загрузка
loadAirData();

// авто-обновление каждые 5 минут
setInterval(loadAirData, 300000);

</script>

</body>
</html>
